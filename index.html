<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2026 Reports Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob-bg"></div>
    
    <main class="dashboard">
        <header class="header">
            <h1>Executive PA <span class="highlight">2026 Reports</span></h1>
            <p>Select month to view presentation</p>
        </header>

        <div class="bento-grid">
            <div class="card card-large" onclick="window.location.href='jan26.html'">
                <div class="card-content">
                    <span class="tag">Latest</span>
                    <h2>Jan-Feb 2026</h2>
                    <p>Current Performance & Progress</p>
                </div>
                <div class="arrow">↗</div>
            </div>

            <div class="card card-purple" onclick="window.location.href='https://ptaltri.my.canva.site/end-year'">
                <h3>Desember</h3>
                <div class="icon">⚡</div>
            </div>

            <div class="card card-red" onclick="window.location.href='nov.html'">
                <h3>Okt-Nov</h3>
                <div class="icon">💼</div>
            </div>

            <div class="card card-pink" onclick="window.location.href='sept.html'">
                <h3>September</h3>
                <div class="icon">🌸</div>
            </div>

            <div class="card card-orange" onclick="window.location.href='kopriw.html'">
                <h3>Kopri</h3>
                <div class="icon">🍊</div>
            </div>

            <div class="card card-green" onclick="window.location.href='agt.html'">
                <h3>August-July</h3>
                <div class="icon">🌿</div>
            </div>

            <div class="card card-neon" onclick="window.location.href='https://ptaltri.my.canva.site/present-juni'">
                <h3>June</h3>
                <div class="icon">🌼</div>
            </div>
        </div>

        <footer class="footer">
            Tasya Urfah © 2025
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
</body>
</html>
